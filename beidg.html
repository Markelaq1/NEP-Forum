<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Бейджи — НЭП</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #0B0E14;
            color: #E8EDF2;
            padding: 40px 20px;
            min-height: 100vh;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, #1A2A3A 0%, #0A0C10 90%);
            z-index: -2;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: 6px;
            background: linear-gradient(135deg, #FFFFFF 0%, #4fc3f7 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 40px;
            text-align: center;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }

        .badges-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
            max-width: 900px;
            margin: 0 auto;
        }

        .badge {
            background: #121620;
            border: 2px solid #4fc3f7;
            border-radius: 32px;
            padding: 35px 30px 30px;
            text-align: center;
            box-shadow: 0 15px 30px -10px rgba(0, 0, 0, 0.5);
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }

        /* Уголки */
        .badge::before {
            content: '';
            position: absolute;
            top: 15px;
            left: 15px;
            width: 20px;
            height: 20px;
            border-top: 2px solid #4fc3f7;
            border-left: 2px solid #4fc3f7;
        }

        .badge::after {
            content: '';
            position: absolute;
            bottom: 15px;
            right: 15px;
            width: 20px;
            height: 20px;
            border-bottom: 2px solid #4fc3f7;
            border-right: 2px solid #4fc3f7;
        }

        .badge-logo {
            max-width: 160px;
            height: auto;
            margin-bottom: 5px;
        }

        .badge-divider {
            width: 80%;
            height: 2px;
            background: #4fc3f7;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }

        .badge-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #4fc3f7;
            font-weight: 600;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }

        .badge-line {
            border: none;
            border-bottom: 2px dashed #4fc3f7;
            width: 80%;
            min-height: 45px;
            margin: 5px 0;
            font-size: 1.8rem;
            font-weight: 700;
            color: #FFFFFF;
            text-align: center;
            outline: none;
            background: transparent;
            letter-spacing: 1px;
        }

        .badge-line::placeholder {
            color: rgba(255, 255, 255, 0.3);
            font-size: 1rem;
            font-weight: 400;
            letter-spacing: 1px;
        }

        .badge-footer {
            font-size: 0.7rem;
            color: #4fc3f7;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 600;
        }

        @media (max-width: 768px) {
            .badges-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .badge {
                padding: 25px 20px 25px;
                border-radius: 24px;
            }

            h1 {
                font-size: 2rem;
            }

            .badge-logo {
                max-width: 130px;
            }

            .badge-line {
                font-size: 1.5rem;
            }
        }

        @media print {
            body {
                background: #0B0E14;
                padding: 20px;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

            body::before {
                display: block;
                background: radial-gradient(circle at 20% 30%, #1A2A3A 0%, #0A0C10 90%);
            }

            .badge {
                background: #121620;
                border: 2px solid #4fc3f7;
                box-shadow: none;
                break-inside: avoid;
                page-break-inside: avoid;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

            .badge-divider {
                background: #4fc3f7;
            }

            .badge-label {
                color: #4fc3f7;
            }

            .badge-line {
                border-bottom-color: #4fc3f7;
                font-size: 1.8rem;
                font-weight: 700;
                color: #FFFFFF;
            }

            .badge-footer {
                color: #4fc3f7;
            }

            h1 {
                background: linear-gradient(135deg, #FFFFFF 0%, #4fc3f7 100%);
                -webkit-background-clip: text;
                background-clip: text;
                color: transparent;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
        }
    </style>
</head>
